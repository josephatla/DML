<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Surat Jalan Dinamika Metalindo</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    
    .container {
      background-color: #ffffff;
      width: 100%;
      max-width: 550px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    header { margin-bottom: 1.5rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 1rem; }
    header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    header p { color: #6b7280; font-size: 0.875rem; }

    /* Input Nama Pelanggan */
    .customer-section { margin-bottom: 1.5rem; }
    
    .items-container {
      max-height: 45vh;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.25rem;
    }
    
    .item-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      background-color: #f9fafb;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      margin-bottom: 0.75rem;
      transition: all 0.2s ease-in-out;
      flex-wrap: wrap;
    }

    .item-row:hover { border-color: #d1d5db; }
    
    .input-group {
      display: flex;
      flex-direction: column;
    }
    .input-group.name-group { flex: 1; min-width: 120px; }
    .input-group.qty-group { width: 4.5rem; }
    .input-group.unit-group { width: 5.5rem; }
    
    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 0.25rem;
    }
    
    input {
      height: 48px;
      padding: 0 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 16px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input.input-error {
      border-color: #ef4444;
      background-color: #fef2f2;
    }
    
    button {
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      transition: all 0.2s ease;
    }
    
    .delete-btn {
      width: 48px;
      height: 48px;
      background-color: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      flex-shrink: 0;
    }

    .delete-btn:hover { background-color: #fee2e2; }
    
    .add-btn {
      width: 100%;
      height: 48px;
      background-color: #ffffff;
      color: #3b82f6;
      border: 2px solid #3b82f6;
      margin-bottom: 1rem;
    }

    .add-btn:hover { background-color: #eff6ff; }
    .add-btn:active { transform: scale(0.98); }

    #error-message {
      color: #ef4444;
      font-size: 0.875rem;
      font-weight: 500;
      text-align: center;
      margin-bottom: 1rem;
      display: none;
    }
    
    .bottom-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: auto;
    }
    
    .clear-btn {
      width: 56px;
      height: 56px;
      background-color: #ef4444;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .clear-btn:hover { background-color: #dc2626; }
    .clear-btn:active { transform: scale(0.95); }
    
    .generate-btn {
      flex: 1;
      height: 56px;
      background-color: #2563eb;
      color: white;
      font-size: 1.125rem;
    }

    .generate-btn:hover {
      background-color: #1d4ed8;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
    }
    .generate-btn:active { transform: scale(0.98); }

    @media (max-width: 480px) {
      body { padding: 0; background-color: #ffffff; }
      .container {
        max-width: 100%; border-radius: 0; border: none; box-shadow: none; min-height: 100vh; padding: 1.25rem;
      }
      .items-container { max-height: calc(100vh - 350px); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Surat Jalan Dinamika</h1>
      <p>Buat format PDF otomatis sesuai nota toko</p>
    </header>

    <div class="customer-section input-group">
      <label>Nama Pelanggan / Kepada (Opsional)</label>
      <input type="text" id="customer-name" placeholder="mis. Sumber Baja">
    </div>

    <div class="items-container" id="items-container">
      <div class="item-row">
        <div class="input-group qty-group">
          <label>Qty</label>
          <input type="number" class="item-qty" value="1" min="1" oninput="clearError(this)">
        </div>
        <div class="input-group unit-group">
          <label>Satuan</label>
          <input type="text" class="item-unit" value="Batang" oninput="clearError(this)">
        </div>
        <div class="input-group name-group">
          <label>Nama Barang (Ukuran/Tipe)</label>
          <input type="text" class="item-name" placeholder="mis. Hollo 100x100 x 4,5 mm" oninput="clearError(this)">
        </div>
        <button class="delete-btn" onclick="removeItem(this)" aria-label="Hapus item">✕</button>
      </div>
    </div>

    <button class="add-btn" onclick="addItem()">＋ Tambah Barang Lain</button>

    <div id="error-message">Mohon lengkapi kotak yang berwarna merah sebelum download.</div>

    <div class="bottom-actions">
      <button class="clear-btn" onclick="clearAll()" title="Hapus Semua Data" aria-label="Hapus Semua Data">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
      
      <button class="generate-btn" onclick="generatePDF()">Download PDF</button>
    </div>
  </div>

  <script>
    const itemsContainer = document.getElementById('items-container');
    const errorMessage = document.getElementById('error-message');

    // Fungsi Pengubah Angka Menjadi Terbilang (Contoh: 2 -> dua)
    function angkaTerbilang(angka) {
      const huruf = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
      if (angka < 12) return huruf[angka];
      if (angka < 20) return angkaTerbilang(angka - 10) + " belas";
      if (angka < 100) return angkaTerbilang(Math.floor(angka / 10)) + " puluh " + angkaTerbilang(angka % 10);
      if (angka < 200) return "seratus " + angkaTerbilang(angka - 100);
      if (angka < 1000) return angkaTerbilang(Math.floor(angka / 100)) + " ratus " + angkaTerbilang(angka % 100);
      return angka; // Jika sangat besar dibiarkan angkanya
    }

    function clearError(inputElement) {
      inputElement.classList.remove('input-error');
      if (document.querySelectorAll('.input-error').length === 0) {
        errorMessage.style.display = 'none';
      }
    }

    function addItem() {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <div class="input-group qty-group">
          <label>Qty</label>
          <input type="number" class="item-qty" value="1" min="1" oninput="clearError(this)">
        </div>
        <div class="input-group unit-group">
          <label>Satuan</label>
          <input type="text" class="item-unit" value="Batang" oninput="clearError(this)">
        </div>
        <div class="input-group name-group">
          <label>Nama Barang (Ukuran/Tipe)</label>
          <input type="text" class="item-name" placeholder="mis. Hollo 100x100 x 4,5 mm" oninput="clearError(this)">
        </div>
        <button class="delete-btn" onclick="removeItem(this)" aria-label="Hapus item">✕</button>
      `;
      itemsContainer.appendChild(row);
      setTimeout(() => { itemsContainer.scrollTop = itemsContainer.scrollHeight; }, 10);
    }

    function removeItem(button) {
      if (itemsContainer.children.length > 1) {
        button.parentElement.remove();
        if (document.querySelectorAll('.input-error').length === 0) {
          errorMessage.style.display = 'none';
        }
      } else {
        const row = button.parentElement;
        row.querySelector('.item-name').value = '';
        row.querySelector('.item-qty').value = '1';
        row.querySelector('.item-unit').value = 'Batang';
      }
    }

    function clearAll() {
      if (confirm("Apakah Anda yakin ingin menghapus semua daftar barang?")) {
        itemsContainer.innerHTML = '';
        document.getElementById('customer-name').value = '';
        errorMessage.style.display = 'none';
        addItem();
      }
    }

    function generatePDF() {
      const rows = document.querySelectorAll('.item-row');
      let isValid = true;

      document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
      errorMessage.style.display = 'none';

      rows.forEach((row) => {
        const nameInput = row.querySelector('.item-name');
        const qtyInput = row.querySelector('.item-qty');
        
        if (nameInput.value.trim() === '') {
          nameInput.classList.add('input-error');
          isValid = false;
        }
        if (!qtyInput.value || parseInt(qtyInput.value) < 1) {
          qtyInput.classList.add('input-error');
          isValid = false;
        }
      });

      if (!isValid) {
        errorMessage.style.display = 'block';
        return;
      }

      // Mulai buat PDF
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      
      // === BAGIAN KIRI ATAS (KOP SURAT) ===
      doc.text("Jl. Kembangan Utara Raya No.10A", 14, 20);
      doc.text("Jakarta Barat", 14, 25);
      doc.text("Telp. 08161181636", 14, 30);

      // === BAGIAN KANAN ATAS (TANGGAL & PELANGGAN) ===
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      const tanggalFormat = `${dd} - ${mm} - ${yyyy}`;
      
      const customerName = document.getElementById('customer-name').value.trim();

      doc.text(`Jakarta, ${tanggalFormat}`, 140, 20);
      if(customerName !== '') {
        doc.text(customerName, 140, 25);
      }
      // Garis titik-titik Kepada
      doc.text("...........................................................", 140, 26);
      doc.text("...........................................................", 140, 31);

      // === TABEL HEADER ===
      let startY = 45;
      doc.setLineWidth(0.3);
      
      doc.line(14, startY, 196, startY); // Garis atas tabel
      
      doc.setFont("helvetica", "bold");
      doc.text("No", 19, startY + 6, { align: "center" });
      doc.text("BANYAKNYA", 52, startY + 6, { align: "center" });
      doc.text("BARANG", 138, startY + 6, { align: "center" });
      
      doc.line(14, startY + 10, 196, startY + 10); // Garis bawah header

      // === ISI TABEL (BARIS BARANG) ===
      doc.setFont("helvetica", "normal");
      let currentY = startY + 10;
      let rowIndex = 1;

      rows.forEach((row) => {
        const name = row.querySelector('.item-name').value.trim();
        const qty = parseInt(row.querySelector('.item-qty').value);
        const unit = row.querySelector('.item-unit').value.trim() || 'Batang';
        
        // Format angka ke teks (Misal: 2 -> 2 ( dua ) Batang)
        const teksAngka = angkaTerbilang(qty).trim();
        const qtyFormat = `${qty} ( ${teksAngka} )    ${unit}`;
        
        doc.text(rowIndex.toString(), 19, currentY + 7, { align: "center" });
        doc.text(qtyFormat, 26, currentY + 7);
        doc.text(name, 82, currentY + 7);
        
        currentY += 10;
        doc.line(14, currentY, 196, currentY); // Garis pemisah baris
        rowIndex++;
      });

      // Tambahkan baris kosong jika item sedikit (Agar tabel tetap berbentuk rapi seperti di kertas)
      const minimumRows = 6;
      while(rowIndex <= minimumRows) {
        currentY += 10;
        doc.line(14, currentY, 196, currentY);
        rowIndex++;
      }

      // Garis Vertikal Tabel
      doc.line(14, startY, 14, currentY);   // Garis paling kiri
      doc.line(24, startY, 24, currentY);   // Pembatas No | Banyaknya
      doc.line(80, startY, 80, currentY);   // Pembatas Banyaknya | Barang
      doc.line(196, startY, 196, currentY); // Garis paling kanan

      // === FOOTER (TANDA TANGAN) ===
      doc.text("Hormat Kami,", 14, currentY + 15);
      doc.text("DINAMIKA METALINDO", 14, currentY + 20);
      // Area bawahnya dibiarkan kosong untuk ttd

      // Download file PDF
      doc.save(`Surat-Jalan-${Date.now()}.pdf`);
    }
  </script>
</body>
</html>
